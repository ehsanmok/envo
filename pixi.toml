[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "envo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.1"
preview = ["pixi-build"]

[package]
name = "envo"
version = "0.1.1"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

[dependencies]
envo = { path = "." }
mojo = "==0.26.3.0.dev2026042005"
morph = { git = "https://github.com/ehsanmok/morph.git", branch = "main" }

[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
# Format
install-pre-commit = "pre-commit install"
format = { cmd = "mojo format envo tests examples benchmark", depends-on = ["install-pre-commit"] }

# Tests
tests       = "mojo -I . tests/test_loader.mojo && mojo -I . tests/test_env.mojo"
test-loader = "mojo -I . tests/test_loader.mojo"
test-env    = "mojo -I . tests/test_env.mojo"

# Examples
example = "mojo -I . examples/example.mojo"

# Benchmark
bench = "mojo -I . benchmark/bench.mojo"

# Docs
docs       = "mojodoc ./envo --open"
docs-build = "mojodoc ./envo --out-dir target/doc --base-url /envo/"
